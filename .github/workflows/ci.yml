name: ARES CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

env:
  ARES_SECRET_KEY: "ci-secret-key-placeholder-min32chars!!"
  ARES_ENCRYPTION_KEY: "ci-encryption-key-placeholder-32chars"
  ARES_DEFAULT_ADMIN_PASSWORD: "CiAdmin1!-placeholder-secret99"

jobs:
  backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python -m compileall ares tests
      - run: pytest tests/unit -q --tb=short --timeout=60 --timeout-method=thread --maxfail=1

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
